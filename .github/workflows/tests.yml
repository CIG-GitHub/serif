name: Tests

on: [push, pull_request]

jobs:
  test:
    name: Python ${{ matrix.python-version }} / ${{ matrix.accelerators }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.10"
            accelerators: pure Python
            extras: dev
            pins: ""
          - python-version: "3.10"
            accelerators: NumPy only
            extras: dev,numpy
            pins: numpy==1.24.0
          - python-version: "3.10"
            accelerators: Arrow only
            extras: dev,arrow
            pins: pyarrow==25.0.0
          - python-version: "3.10"
            accelerators: NumPy + Arrow
            extras: dev,numpy,arrow
            pins: numpy==1.24.0 pyarrow==25.0.0
          - python-version: "3.11"
            accelerators: NumPy + Arrow
            extras: dev,numpy,arrow
            pins: ""
          - python-version: "3.12"
            accelerators: NumPy + Arrow
            extras: dev,numpy,arrow
            pins: ""
          - python-version: "3.13"
            accelerators: NumPy + Arrow
            extras: dev,numpy,arrow
            pins: ""
          - python-version: "3.14"
            accelerators: NumPy + Arrow
            extras: dev,numpy,arrow
            pins: ""

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install package and test dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install ".[${{ matrix.extras }}]" ${{ matrix.pins }}

    - name: Verify accelerator environment
      env:
        ACCELERATOR_MODE: ${{ matrix.accelerators }}
      run: |
        python - <<'PY'
        import importlib.util
        import os

        mode = os.environ['ACCELERATOR_MODE']
        expected = {
            'pure Python': (False, False),
            'NumPy only': (True, False),
            'Arrow only': (False, True),
            'NumPy + Arrow': (True, True),
        }[mode]
        actual = (
            importlib.util.find_spec('numpy') is not None,
            importlib.util.find_spec('pyarrow') is not None,
        )
        assert actual == expected, (mode, expected, actual)
        PY

    - name: Run tests
      run: python -m pytest -v

  package:
    name: Build and inspect package
    runs-on: ubuntu-latest
    needs: [test]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Build distribution artifacts
      run: |
        python -m pip install --upgrade pip
        python -m pip install build twine
        python -m build
        python -m twine check dist/*

    - name: Install and inspect wheel
      run: |
        python -m pip install --force-reinstall --no-deps dist/*.whl
        python -c "import importlib.metadata as m, serif; assert serif.__version__ == m.version('serif')"
