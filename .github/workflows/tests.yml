name: Tests

on: [push, pull_request]

jobs:
  test:
    name: Python ${{ matrix.python-version }} / ${{ matrix.accelerators.name }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        accelerators:
          - name: pure Python
            extras: dev
          - name: NumPy only
            extras: dev,numpy
          - name: Arrow only
            extras: dev,arrow
          - name: NumPy + Arrow
            extras: dev,numpy,arrow

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install package and test dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install ".[${{ matrix.accelerators.extras }}]"

    - name: Verify accelerator environment
      env:
        ACCELERATOR_MODE: ${{ matrix.accelerators.name }}
      run: |
        python - <<'PY'
        import importlib.util
        import os

        mode = os.environ['ACCELERATOR_MODE']
        expected = {
            'pure Python': (False, False),
            'NumPy only': (True, False),
            'Arrow only': (False, True),
            'NumPy + Arrow': (True, True),
        }[mode]
        actual = (
            importlib.util.find_spec('numpy') is not None,
            importlib.util.find_spec('pyarrow') is not None,
        )
        assert actual == expected, (mode, expected, actual)
        PY

    - name: Run tests
      run: python -m pytest -v

  minimum-accelerators:
    name: Minimum supported accelerators
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install minimum supported versions
      run: |
        python -m pip install --upgrade pip
        python -m pip install ".[dev]" "numpy==1.24.0" "pyarrow==25.0.0"

    - name: Run tests
      run: python -m pytest -v

  package:
    name: Build and inspect package
    runs-on: ubuntu-latest
    needs: [test, minimum-accelerators]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Build distribution artifacts
      run: |
        python -m pip install --upgrade pip
        python -m pip install build twine
        python -m build
        python -m twine check dist/*

    - name: Install and inspect wheel
      run: |
        python -m pip install --force-reinstall --no-deps dist/*.whl
        python -c "import importlib.metadata as m, serif; assert serif.__version__ == m.version('serif')"
